<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário de Publicações</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f7; color: #1a1a1a; min-height: 100vh; }
  .app { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .cal-title { font-size: 20px; font-weight: 500; color: #1a1a1a; }
  .cal-nav { display: flex; align-items: center; gap: 8px; }
  .cal-nav button { background: none; border: 1px solid #e0ddd6; border-radius: 8px; padding: 5px 12px; cursor: pointer; font-size: 13px; color: #4a4a4a; transition: background .1s; }
  .cal-nav button:hover { background: #f0ede8; }
  .legend { display: flex; gap: 16px; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #777; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-agendar { background: #F59E0B; }
  .dot-agendado { background: #3B82F6; }
  .dot-publicado { background: #22C55E; }
  .grid-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; margin-bottom: 1px; }
  .grid-header div { text-align: center; font-size: 11px; font-weight: 500; color: #999; padding: 6px 0; text-transform: uppercase; letter-spacing: .05em; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #e5e2db; border: 1px solid #e5e2db; border-radius: 12px; overflow: hidden; }
  .day { background: #fff; min-height: 110px; padding: 6px 8px; cursor: pointer; position: relative; transition: background .1s; }
  .day:hover { background: #f7f5f0; }
  .day.other-month { background: #f9f9f7; }
  .day.other-month .day-num { color: #ccc; }
  .day-num { font-size: 13px; font-weight: 500; color: #aaa; display: flex; align-items: center; justify-content: flex-end; margin-bottom: 4px; }
  .day-num.today-num { background: #E24B4A; color: #fff; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 12px; margin-left: auto; }
  .post-card { border-radius: 4px; padding: 3px 6px; font-size: 11px; line-height: 1.35; margin-bottom: 3px; cursor: pointer; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .post-card.agendar  { background: #FEF3C7; color: #92400E; border-left: 2.5px solid #F59E0B; }
  .post-card.agendado { background: #DBEAFE; color: #1E40AF; border-left: 2.5px solid #3B82F6; }
  .post-card.publicado{ background: #DCFCE7; color: #14532D; border-left: 2.5px solid #22C55E; }
  .add-btn { position: absolute; bottom: 6px; right: 6px; width: 20px; height: 20px; border-radius: 50%; border: 1px solid #e0ddd6; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #aaa; cursor: pointer; opacity: 0; transition: opacity .1s; line-height: 1; }
  .day:hover .add-btn { opacity: 1; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.3); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: #fff; border-radius: 12px; border: 1px solid #e0ddd6; padding: 1.5rem; width: 340px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,.12); }
  .modal h3 { font-size: 15px; font-weight: 500; margin-bottom: 1rem; color: #1a1a1a; }
  .modal label { font-size: 12px; color: #777; display: block; margin-bottom: 4px; margin-top: 12px; }
  .modal input, .modal select, .modal textarea { width: 100%; font-size: 13px; padding: 7px 10px; border: 1px solid #e0ddd6; border-radius: 8px; background: #fff; color: #1a1a1a; font-family: inherit; outline: none; transition: border .15s; }
  .modal input:focus, .modal select:focus, .modal textarea:focus { border-color: #6C3FC5; }
  .modal textarea { height: 70px; resize: vertical; }
  .modal-actions { display: flex; gap: 8px; margin-top: 1.25rem; justify-content: flex-end; align-items: center; }
  .modal-actions button { font-size: 13px; padding: 7px 16px; border-radius: 8px; cursor: pointer; font-family: inherit; transition: opacity .1s; }
  .btn-cancel  { background: none; border: 1px solid #e0ddd6; color: #777; }
  .btn-cancel:hover { background: #f7f5f0; }
  .btn-save    { background: #6C3FC5; border: none; color: #fff; }
  .btn-save:hover { opacity: .88; }
  .btn-delete  { background: none; border: 1px solid #E24B4A; color: #E24B4A; margin-right: auto; }
  .btn-delete:hover { background: #fff0f0; }
  .status-bar { font-size: 12px; color: #aaa; text-align: center; padding: 6px 0 0; min-height: 20px; }
  .status-bar.erro { color: #E24B4A; }
</style>
</head>
<body>
<div class="app">
  <div class="cal-header">
    <span class="cal-title" id="cal-title"></span>
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">&#8249;</button>
      <button onclick="goToday()">Hoje</button>
      <button onclick="changeMonth(1)">&#8250;</button>
    </div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="dot dot-agendar"></div>Agendar</div>
    <div class="legend-item"><div class="dot dot-agendado"></div>Agendado</div>
    <div class="legend-item"><div class="dot dot-publicado"></div>Publicado</div>
  </div>
  <div class="grid-header">
    <div>dom</div><div>seg</div><div>ter</div><div>qua</div><div>qui</div><div>sex</div><div>sáb</div>
  </div>
  <div class="grid" id="cal-grid"></div>
  <div class="status-bar" id="status-bar">Conectando...</div>
</div>

<div class="modal-bg" id="modal" style="display:none">
  <div class="modal">
    <h3 id="modal-title">Novo post</h3>
    <label>Tema</label>
    <textarea id="m-tema" placeholder="Sobre o que é esse post?"></textarea>
    <label>Status</label>
    <select id="m-status">
      <option value="agendar">Agendar</option>
      <option value="agendado">Agendado</option>
      <option value="publicado">Publicado</option>
    </select>
    <label>Formato</label>
    <select id="m-formato">
      <option>Reels</option>
      <option>Carrossel</option>
      <option>Feed (estático)</option>
      <option>Story</option>
    </select>
    <div class="modal-actions">
      <button class="btn-delete" id="btn-delete" onclick="deletePost()" style="display:none">Excluir</button>
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="savePost()">Salvar</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCxKRXanh6CdkDyOk0WC5a6l-Z20770mS0",
    authDomain: "conteudoskakagomes.firebaseapp.com",
    databaseURL: "https://conteudoskakagomes-default-rtdb.firebaseio.com",
    projectId: "conteudoskakagomes",
    storageBucket: "conteudoskakagomes.firebasestorage.app",
    messagingSenderId: "562210048928",
    appId: "1:562210048928:web:13bc3c5a0a3c87f82372c5"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const postsRef = ref(db, 'posts');

  let posts = {};
  let cur = new Date();
  let editing = null;
  let editDay = null;

  const meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

  function setStatus(msg, erro = false) {
    const el = document.getElementById('status-bar');
    el.textContent = msg;
    el.className = 'status-bar' + (erro ? ' erro' : '');
  }

  function key(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  onValue(postsRef, (snapshot) => {
    posts = snapshot.val() || {};
    render();
    setStatus('✓ Sincronizado');
    setTimeout(() => setStatus(''), 2000);
  }, () => {
    setStatus('Erro ao conectar. Verifique as regras do banco.', true);
  });

  function render() {
    const y = cur.getFullYear(), m = cur.getMonth();
    document.getElementById('cal-title').textContent = `${meses[m]} de ${y}`;
    const grid = document.getElementById('cal-grid');
    grid.innerHTML = '';
    const first = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const daysInPrev  = new Date(y, m, 0).getDate();
    const today = new Date();
    const totalCells = Math.ceil((first + daysInMonth) / 7) * 7;

    for (let i = 0; i < totalCells; i++) {
      const div = document.createElement('div');
      div.className = 'day';
      let dayNum, isOther = false, dateObj;
      if (i < first) {
        dayNum = daysInPrev - first + 1 + i; isOther = true;
        dateObj = new Date(y, m-1, dayNum);
      } else if (i >= first + daysInMonth) {
        dayNum = i - first - daysInMonth + 1; isOther = true;
        dateObj = new Date(y, m+1, dayNum);
      } else {
        dayNum = i - first + 1;
        dateObj = new Date(y, m, dayNum);
      }
      if (isOther) div.classList.add('other-month');

      const isT = dateObj.toDateString() === today.toDateString();
      const numSpan = document.createElement('div');
      numSpan.className = 'day-num' + (isT ? ' today-num' : '');
      numSpan.textContent = dayNum;
      div.appendChild(numSpan);

      const k = key(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate());
      const dayPosts = posts[k];
      if (dayPosts) {
        Object.entries(dayPosts).forEach(([id, p]) => {
          const card = document.createElement('div');
          card.className = `post-card ${p.status}`;
          card.textContent = p.tema || '(sem tema)';
          card.title = p.tema;
          card.onclick = (e) => { e.stopPropagation(); openEdit(k, id, p); };
          div.appendChild(card);
        });
      }

      const add = document.createElement('div');
      add.className = 'add-btn';
      add.textContent = '+';
      add.onclick = (e) => { e.stopPropagation(); openNew(k, dateObj); };
      div.appendChild(add);
      div.onclick = () => openNew(k, dateObj);
      grid.appendChild(div);
    }
  }

  function openNew(k, d) {
    editing = null; editDay = k;
    document.getElementById('modal-title').textContent =
      `Novo post — ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
    document.getElementById('m-tema').value = '';
    document.getElementById('m-status').value = 'agendar';
    document.getElementById('m-formato').value = 'Reels';
    document.getElementById('btn-delete').style.display = 'none';
    document.getElementById('modal').style.display = 'flex';
    setTimeout(() => document.getElementById('m-tema').focus(), 50);
  }

  function openEdit(k, id, p) {
    editing = id; editDay = k;
    const parts = k.split('-');
    document.getElementById('modal-title').textContent =
      `Editar post — ${parts[2]}/${parts[1]}/${parts[0]}`;
    document.getElementById('m-tema').value = p.tema;
    document.getElementById('m-status').value = p.status;
    document.getElementById('m-formato').value = p.formato;
    document.getElementById('btn-delete').style.display = 'block';
    document.getElementById('modal').style.display = 'flex';
  }

  async function savePost() {
    const p = {
      tema:    document.getElementById('m-tema').value,
      status:  document.getElementById('m-status').value,
      formato: document.getElementById('m-formato').value
    };
    const id = editing || Date.now().toString();
    try {
      await set(ref(db, `posts/${editDay}/${id}`), p);
      closeModal();
    } catch(e) {
      setStatus('Erro ao salvar. Verifique as regras do banco.', true);
    }
  }

  async function deletePost() {
    try {
      await remove(ref(db, `posts/${editDay}/${editing}`));
      closeModal();
    } catch(e) {
      setStatus('Erro ao excluir.', true);
    }
  }

  function closeModal() {
    document.getElementById('modal').style.display = 'none';
    editing = null; editDay = null;
  }

  function changeMonth(d) {
    cur = new Date(cur.getFullYear(), cur.getMonth() + d, 1);
    render();
  }

  function goToday() { cur = new Date(); render(); }

  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  window.savePost    = savePost;
  window.deletePost  = deletePost;
  window.closeModal  = closeModal;
  window.changeMonth = changeMonth;
  window.goToday     = goToday;
</script>
</body>
</html>
